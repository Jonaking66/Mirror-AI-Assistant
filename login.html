<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIRROR — Login</title>
  <link rel="stylesheet" href="style.css" />
  
<script>
  let currentRole = 'student';

  // Demo credentials
  const credentials = {
    student: { username: '24ZAD109298', password: 'student123', redirect: 'index.html' },
    admin:   { username: 'admin',       password: 'admin123',   redirect: 'admin.html' },
  };

  function setRole(role, btn) {
    currentRole = role;

    // Update active tab
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    // Update label
    document.getElementById('usernameLabel').textContent =
      role === 'admin' ? 'Username' : 'Registration Number';

    document.getElementById('usernameInput').placeholder =
      role === 'admin' ? 'e.g. admin' : 'e.g. 24ZAD109298';

    // Clear inputs & error
    document.getElementById('usernameInput').value = '';
    document.getElementById('passwordInput').value = '';
    document.getElementById('errorMsg').style.display = 'none';
  }

  function handleLogin() {
    const username = document.getElementById('usernameInput').value.trim();
    const password = document.getElementById('passwordInput').value.trim();
    const errorMsg = document.getElementById('errorMsg');

    const creds = credentials[currentRole];

    if (username === creds.username && password === creds.password) {
      // Save session info
      localStorage.setItem('mirrorUser', JSON.stringify({
        role: currentRole,
        username,
        name: currentRole === 'admin' ? 'Administrator' : 'Otieno Jonathan Daniels',
      }));
      errorMsg.style.display = 'none';
      window.location.href = creds.redirect;
    } else {
      errorMsg.style.display = 'block';
      document.getElementById('passwordInput').value = '';
    }
  }

  // Allow Enter key
  document.addEventListener('keypress', e => {
    if (e.key === 'Enter') handleLogin();
  });
  </script>

<body class="login-page">

<div class="login-card">

  <!-- Logo -->
  <div class="login-logo">
    <div class="login-logo-icon">🪞</div>
    <div>
      <div class="login-logo-text">MIRROR</div>
      <div class="login-logo-sub">AI Campus Assistant</div>
    </div>
  </div>

  <!-- Heading -->
  <div class="login-heading">Welcome back 👋</div>
  <div class="login-sub">Sign in to your account to continue</div>

  <!-- Role tabs -->
  <div class="role-tabs">
    <button class="role-tab active" onclick="setRole('student', this)">🎓 Student</button>
    <button class="role-tab"        onclick="setRole('admin', this)">🛡️ Admin</button>
  </div>

  <!-- Demo hint -->
  <div class="demo-hint" id="demoHint">
    <strong>Student demo:</strong> reg no <strong>24ZAD109298</strong> · password <strong>student123</strong><br>
    <strong>Admin demo:</strong> username <strong>admin</strong> · password <strong>admin123</strong>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg">❌ Incorrect credentials. Please try again.</div>

  <!-- Form -->
  <div class="field">
    <label id="usernameLabel">Registration Number</label>
    <input type="text" id="usernameInput" placeholder="e.g. 24ZAD109298" />
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="passwordInput" placeholder="Enter your password" />
  </div>

  <button class="login-btn" onclick="handleLogin()">Sign In →</button>

  <div class="login-footer">
    Riara University &nbsp;·&nbsp; Diploma in Computer Science &nbsp;·&nbsp;
    <span onclick="alert('Contact your administrator to reset your password.')">Forgot password?</span>
  </div>

</div>


</body>
</html>
